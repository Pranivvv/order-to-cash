_schema-version: "3.3"
ID: order-to-cash
version: 1.0.0
description: Order to Cash CAP application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install

modules:
  - name: order-to-cash-srv
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    properties:
      NODE_ENV: production
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: order-to-cash-auth

  - name: order-to-cash-router
    type: approuter.nodejs
    path: app
    parameters:
      memory: 128M
      keep-existing-routes: true
    requires:
      - name: order-to-cash-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

resources:
  - name: order-to-cash-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
