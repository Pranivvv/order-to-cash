_schema-version: "3.3"
ID: order-to-cash
version: 1.0.0
description: Order to Cash CAP application

parameters:
  enable-parallel-deployments: true
  appname: 7b303ba1trial-dev-order-to-cash

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install

modules:
  - name: order-to-cash-srv
    type: nodejs
    path: .
    parameters:
      buildpack: nodejs_buildpack
      host: ${appname}-srv
      memory: 256M
    properties:
      NODE_ENV: production
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: order-to-cash-auth

  - name: order-to-cash-router
    type: approuter.nodejs
    path: app
    parameters:
      memory: 128M
      keep-existing-routes: true
    requires:
      - name: order-to-cash-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  - name: order-to-cash-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: order-to-cash-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: o2c-salesorders
          artifacts:
            - o2c-salesorders.zip
          target-path: resources/
        - name: o2c-finance
          artifacts:
            - o2c-finance.zip
          target-path: resources/
        - name: o2c-inventory-ui
          artifacts:
            - o2c-inventory-ui.zip
          target-path: resources/
        - name: o2c-analytics
          artifacts:
            - o2c-analytics.zip
          target-path: resources/
        - name: o2c-advanced
          artifacts:
            - o2c-advanced.zip
          target-path: resources/

  - name: order-to-cash-destination-content
    type: com.sap.application.content
    requires:
      - name: order-to-cash-destination
        parameters:
          content-target: true
      - name: order-to-cash-html5-repo-runtime
        parameters:
          service-key:
            name: order-to-cash-html5-repo-runtime-key
      - name: order-to-cash-auth
        parameters:
          service-key:
            name: order-to-cash-auth-key
    parameters:
      content:
        subaccount:
          existing_destinations_policy: update
          destinations:
            - Name: order-to-cash-html5-repo
              ServiceInstanceName: order-to-cash-html5-repo-runtime
              ServiceKeyName: order-to-cash-html5-repo-runtime-key
              sap.cloud.service: o2c.order.to.cash
            - Name: order-to-cash-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: order-to-cash-auth
              ServiceKeyName: order-to-cash-auth-key
              sap.cloud.service: o2c.order.to.cash
    build-parameters:
      no-source: true

  - name: o2c-salesorders
    type: html5
    path: app/salesorders
    build-parameters:
      build-result: dist
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --dest dist
        - rm -f dist/o2c-salesorders.zip
        - cd dist && zip -qr o2c-salesorders.zip . -x o2c-salesorders.zip

  - name: o2c-finance
    type: html5
    path: app/finance
    build-parameters:
      build-result: dist
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --dest dist
        - rm -f dist/o2c-finance.zip
        - cd dist && zip -qr o2c-finance.zip . -x o2c-finance.zip

  - name: o2c-inventory-ui
    type: html5
    path: app/inventory
    build-parameters:
      build-result: dist
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --dest dist
        - rm -f dist/o2c-inventory-ui.zip
        - cd dist && zip -qr o2c-inventory-ui.zip . -x o2c-inventory-ui.zip

  - name: o2c-analytics
    type: html5
    path: app/analytics
    build-parameters:
      build-result: dist
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --dest dist
        - rm -f dist/o2c-analytics.zip
        - cd dist && zip -qr o2c-analytics.zip . -x o2c-analytics.zip

  - name: o2c-advanced
    type: html5
    path: app/advanced
    build-parameters:
      build-result: dist
      supported-platforms: []
      builder: custom
      commands:
        - npm install
        - npx ui5 build --dest dist
        - rm -f dist/o2c-advanced.zip
        - cd dist && zip -qr o2c-advanced.zip . -x o2c-advanced.zip

resources:
  - name: order-to-cash-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: order-to-cash-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: order-to-cash-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: order-to-cash-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
